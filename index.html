<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AutoWork AI - Live Landing Page Builder</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- App Header -->
  <header class="app-header">
    <div class="app-logo">
      <div class="logo-icon">A</div>
      <span>AutoWork Builder</span>
    </div>
    <div class="header-actions">
      <button class="btn" id="btn-export-json">
        <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M8 9l3 3-3 3m5 0h3M5 20h14a2 2 0 002-2V6a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"></path></svg>
        JSON 내보내기
      </button>
      <button class="btn btn-primary" id="btn-export-html">
        <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"></path></svg>
        HTML 코드 다운로드
      </button>
    </div>
  </header>

  <!-- Workspace -->
  <div class="app-workspace">
    
    <!-- Left Sidebar: Templates & Block List -->
    <aside class="sidebar-left">
      <!-- Section 1: Template Presets -->
      <div class="sidebar-section">
        <h3 class="section-title">템플릿 프리셋</h3>
        <div class="template-grid" id="template-selector">
          <!-- Dynamically filled templates -->
        </div>
      </div>
      
      <!-- Section 2: Active Blocks Structure -->
      <div class="sidebar-section">
        <h3 class="section-title font-bold">페이지 레이아웃 구조</h3>
        <div class="block-list" id="block-list-container">
          <!-- Dynamically filled blocks -->
        </div>
        
        <!-- Add Block Section -->
        <div class="add-block-container">
          <select id="add-block-select" class="add-block-select">
            <option value="" disabled selected>추가할 블록 선택...</option>
            <option value="Header_Basic">기본 헤더 (Header_Basic)</option>
            <option value="Hero_Type_A">기본 히어로 (Hero_Type_A)</option>
            <option value="Hero_Type_Gradient">그라데이션 히어로 (Hero_Type_Gradient)</option>
            <option value="Hero_Split">좌우 분할 히어로 (Hero_Split) [NEW]</option>
            <option value="Features_Grid">특징 소개 그리드 (Features_Grid)</option>
            <option value="Image_Gallery">이미지 갤러리 (Image_Gallery) [NEW]</option>
            <option value="Stats_Banner">주요 실적 배너 (Stats_Banner)</option>
            <option value="Testimonials_Grid">고객 추천 그리드 (Testimonials_Grid)</option>
            <option value="Pricing_Three_Tier">3단계 요금제 (Pricing_Three_Tier)</option>
            <option value="FAQ_Accordion">자주 묻는 질문 (FAQ_Accordion)</option>
            <option value="Contact_Form">문의 접수 폼 (Contact_Form) [NEW]</option>
            <option value="Logo_Carousel">파트너 로고 캐러셀 (Logo_Carousel) [NEW]</option>
            <option value="Social_Proof">소셜 증거 배너 (Social_Proof) [NEW]</option>
            <option value="Before_After">비포/애프터 비교 (Before_After) [NEW]</option>
            <option value="Newsletter_CTA">뉴스레터 구독 CTA (Newsletter_CTA) [NEW]</option>
            <option value="CTA_Banner">행동 유도 배너 (CTA_Banner)</option>
            <option value="Footer_Simple">심플 푸터 (Footer_Simple)</option>
          </select>
          <button class="btn btn-primary" id="btn-add-block" style="width: 100%; justify-content: center;">
            <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M12 4v16m8-8H4"></path></svg>
            새 블록 추가
          </button>
        </div>
      </div>
    </aside>

    <!-- Center Canvas: Live Preview Viewport -->
    <main class="canvas-container">
      <div class="canvas-toolbar">
        <div class="viewport-controls">
          <button class="viewport-btn active" id="viewport-desktop" data-view="desktop">
            <svg width="12" height="12" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M9.75 17L9 20l-1 1h8l-1-1-.75-3M3 13h18M5 17h14a2 2 0 002-2V5a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"></path></svg>
            데스크톱
          </button>
          <button class="viewport-btn" id="viewport-mobile" data-view="mobile">
            <svg width="12" height="12" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M12 18h.01M8 21h8a2 2 0 002-2V5a2 2 0 00-2-2H8a2 2 0 00-2 2v14a2 2 0 002 2z"></path></svg>
            모바일
          </button>
        </div>
        <!-- Global Theme Customizer -->
        <div style="display: flex; align-items: center; gap: 8px; margin-right: auto; margin-left: 20px;">
          <span style="font-size: 11px; color: var(--text-muted); font-weight: 600;">테마 색상:</span>
          <select id="global-theme-select" class="form-select" style="padding: 4px 8px; font-size: 11.5px; width: 115px; background-color: var(--bg-card); border-color: var(--border-color); color: var(--text-main); outline: none; height: auto;">
            <option value="indigo">인디고 블루</option>
            <option value="violet">바이올렛 퍼플</option>
            <option value="emerald">에메랄드 그린</option>
            <option value="rose">로즈 핑크</option>
            <option value="amber">앰버 오렌지</option>
          </select>
        </div>
        <div class="preview-status">
          <span class="status-dot"></span>
          <span id="preview-status-text">저장됨 (실시간 렌더링 중)</span>
        </div>
      </div>
      
      <div class="viewport-wrapper">
        <div class="preview-viewport" id="preview-viewport-box">
          <iframe id="preview-iframe" class="preview-iframe" title="Landing Page Preview"></iframe>
        </div>
      </div>
    </main>

    <!-- Right Sidebar: Interactive Editing Panels -->
    <aside class="editor-panel">
      <div class="tab-header">
        <button class="tab-btn active" id="tab-visual" data-tab="visual">속성 편집</button>
        <button class="tab-btn" id="tab-json" data-tab="json">JSON 소스</button>
      </div>

      <!-- Tab Content: Visual Form Editor -->
      <div class="tab-content active" id="tab-content-visual">
        <div id="visual-editor-container">
          <div class="empty-state">
            <div class="empty-state-icon">👈</div>
            <p>레이아웃 구조에서 편집할 블록을 클릭하여 선택해 주세요.</p>
          </div>
        </div>
      </div>

      <!-- Tab Content: Live JSON Code view/edit -->
      <div class="tab-content" id="tab-content-json">
        <div class="code-container">
          <div class="code-box-header">
            <span class="code-title">설계도 JSON 데이터</span>
            <button class="btn btn-primary" id="btn-apply-json" style="padding: 4px 10px; font-size: 11px;">
              적용하기
            </button>
          </div>
          <p style="font-size: 11px; color: var(--text-muted); margin-bottom: 10px;">
            JSON 코드를 직접 수정한 다음 '적용하기' 버튼을 누르면 실시간 반영됩니다.
          </p>
          <textarea id="json-editor-textarea" class="code-textarea"></textarea>
        </div>
      </div>
    </aside>

  </div>

  <!-- Modal window for HTML Output -->
  <div class="modal-overlay" id="export-modal">
    <div class="modal-box">
      <div class="modal-header">
        <h4 class="modal-title" id="export-modal-title">HTML 전체 코드 내보내기</h4>
        <button class="modal-close" id="btn-close-modal">&times;</button>
      </div>
      <div class="modal-body">
        <p style="font-size: 13px; color: var(--text-muted); margin-bottom: 12px;">
          이 코드는 Tailwind CSS가 내장된 독립 실행형 HTML 파일입니다. 바로 복사해서 사용 가능합니다.
        </p>
        <textarea id="export-code-textarea" class="code-textarea" style="height: 350px;" readonly></textarea>
      </div>
      <div class="modal-footer">
        <button class="btn" id="btn-copy-code">코드 복사</button>
        <button class="btn btn-primary" id="btn-download-code">파일로 다운로드</button>
      </div>
    </div>
  </div>

  <!-- Toast Notification -->
  <div class="toast" id="toast-message">변경 사항이 반영되었습니다!</div>

  <script src="app.js"></script>
</body>
</html>
